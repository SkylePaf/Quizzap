<!doctype html>
<html lang="en">

  <head>
    <meta charset="ASCII" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizzap Main Menu</title>
    <!-- <script type="module" src="/main.js" defer></script> -->
    <script type="script" src="/index.js" defer></script>
  </head>

  <body>
    <main class="box">

      <header>
        <section id="client_info">
          <div class="MenuSection" id="app_info">
            <p>Quizzap Version : 1.1.0<br>Final Version</p>
          </div>
          <div class="MenuSection" id="user_info">
            <p>Successfully<br><br>connected</p>
          </div>
        </section>
        <section id="current_page_info">
          <div class="MenuSection" id="current_page">
            <p>Menu Principal</p>
          </div>
        </section>
      </header>
      
      <div class="MenuSection" id="main_menu_buttons_wrapper">
        <button onclick="window.open('/Quizzap/src/scenes/QuizzCreator/QuizzCreator.html', '_self')" class="MenuButtons" id="ini_quizz_creator">Créer un nouveau Quizz</button>
        <button onclick="window.open('/Quizzap/src/scenes/QuizzManager/QuizzManager.html', '_self')" class="MenuButtons" id="ini_quizz_manager">Consulter ses Quizz</button>
        <button onclick="window.open('/Quizzap/src/scenes/QuizzBrowser/QuizzBrowser.html', '_self')" class="MenuButtons" id="ini_quizz_browser">Découvrir des Quizz</button>
      </div>
    </main>
  </body>
</html>
